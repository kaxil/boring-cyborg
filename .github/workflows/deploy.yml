name: Deploy to Heroku

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          CI: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          heroku_remote="https://heroku:${HEROKU_API_KEY}@git.heroku.com/boring-cyborg.git"
          git push "${heroku_remote}" HEAD:refs/heads/main --force
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
